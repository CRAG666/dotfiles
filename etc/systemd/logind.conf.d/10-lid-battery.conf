# Suspender al cerrar la tapa SOLO con batería.
#   - HandleLidSwitch: aplica cuando el equipo está con batería -> suspender.
#   - HandleLidSwitchExternalPower: con corriente conectada -> no suspender.
#   - HandleLidSwitchDocked: si hay monitor externo / dock -> no suspender.
# El bloqueo de pantalla previo a suspender lo hace swayidle (before-sleep).
[Login]
HandleLidSwitch=suspend
HandleLidSwitchExternalPower=ignore
HandleLidSwitchDocked=ignore
