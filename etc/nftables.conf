#!/usr/sbin/nft -f

# vim:set ts=2 sw=2 et:

flush ruleset

table inet filter {

  set banlist_v4 {
    type ipv4_addr
    flags dynamic, timeout
    timeout 30m
    comment "IPs baneadas temporalmente (IPv4)"
  }

  set banlist_v6 {
    type ipv6_addr
    flags dynamic, timeout
    timeout 30m
    comment "IPs baneadas temporalmente (IPv6)"
  }

  chain syn_flood_protect {
    tcp flags & (fin|syn|rst|ack) == syn ct state new \
        limit rate over 25/second burst 50 packets \
        log prefix "SYN-FLOOD: " flags all \
        add @banlist_v4 { ip saddr } \
        drop
    return
  }

  chain tcp_flag_scan_drop {
    tcp flags & (fin|syn|rst|ack) == 0x0              drop comment "NULL scan"
    tcp flags & (fin|syn|rst|ack) == fin               drop comment "FIN scan"
    tcp flags & (fin|syn|rst|ack) == (fin|syn)         drop comment "SYN-FIN scan"
    tcp flags & (fin|syn|rst|ack) == (fin|psh|urg)     drop comment "Xmas scan"
    tcp flags & (fin|syn|rst|ack) == (rst|fin)         drop comment "RST-FIN scan"
    tcp flags & (fin|syn|rst|ack) == (syn|rst)         drop comment "SYN-RST scan"
    tcp flags & (fin|syn|rst|ack) == (fin|syn|rst)     drop comment "FIN-SYN-RST scan"
    tcp flags & (fin|syn|rst|psh|ack|urg) == (fin|psh|urg) drop comment "Xmas full"
    return
  }

  chain input {
    type filter hook input priority filter; policy drop;

    # 1: Loopback
    iif lo accept                                    comment "Loopback interno"
    iif != lo ip  daddr 127.0.0.0/8  drop           comment "Spoofed loopback IPv4"
    iif != lo ip6 daddr ::1/128       drop           comment "Spoofed loopback IPv6"

    # 2: Banlist
    ip  saddr @banlist_v4 counter drop               comment "IPs baneadas IPv4"
    ip6 saddr @banlist_v6 counter drop               comment "IPs baneadas IPv6"

    # 3: Conntrack
    ct state established,related accept              comment "Conexiones establecidas/relacionadas"
    ct state invalid               counter drop      comment "Paquetes con estado inválido"

    # 4: TCP
    ct state new tcp flags != 0 jump tcp_flag_scan_drop
    tcp flags & (fin|syn|rst|ack) == syn ct state new jump syn_flood_protect

    # 5: Block Unauthorized DNS (rogue DNS)
    ip  saddr != 127.0.0.1 udp sport 53 drop        comment "Rogue DNS UDP IPv4"
    ip  saddr != 127.0.0.1 tcp sport 53 drop        comment "Rogue DNS TCP IPv4"
    ip6 saddr != ::1        udp sport 53 drop        comment "Rogue DNS UDP IPv6"
    ip6 saddr != ::1        tcp sport 53 drop        comment "Rogue DNS TCP IPv6"

    # 6: ICMP IPv4
    ip protocol icmp icmp type echo-request \
        limit rate 1/second burst 5 packets accept  comment "Ping entrante (1/s)"
    ip protocol icmp icmp type {
        echo-reply,
        destination-unreachable,
        time-exceeded,
        parameter-problem,
    } accept                                         comment "ICMP funcional IPv4"

    # 7: ICMPv6
    ip6 nexthdr icmpv6 icmpv6 type echo-request \
        limit rate 1/second burst 5 packets accept  comment "Ping6 entrante (1/s)"
    ip6 nexthdr icmpv6 icmpv6 type {
        echo-reply,
        destination-unreachable,
        packet-too-big,
        time-exceeded,
        parameter-problem,
        nd-neighbor-solicit,
        nd-neighbor-advert,
        nd-router-advert,
        nd-router-solicit,
        mld-listener-query,
        mld-listener-report,
    } accept                                         comment "ICMPv6 funcional + NDP + MLD"

    # 8: mDNS multicast only
    ip  daddr 224.0.0.251 udp dport 5353 accept     comment "mDNS IPv4 multicast"
    ip6 daddr ff02::fb    udp dport 5353 accept     comment "mDNS IPv6 multicast"

    # 10: Soulseek incoming (rate-limited)
    tcp dport 2234 ct state new \
        limit rate 10/minute burst 5 packets accept comment "Soulseek peers entrantes"

    # 11: Torrent incoming
    tcp dport 51413 ct state new accept             comment "Torrent TCP entrante"
    udp dport 51413 accept                          comment "Torrent UDP entrante"
    udp dport { 6881-6889 } accept                  comment "Torrent DHT UDP entrante"

    # 12: Log
    # limit rate 10/minute burst 20 packets \
    #     log prefix "nftables-INPUT-DROP: " flags all counter \
    #     comment "Log drops (rate-limited para evitar saturación)"
  }

  chain forward {
    type filter hook forward priority filter; policy drop;
    counter comment "Forward siempre drop — no somos router"
  }

  chain output {
    type filter hook output priority filter; policy drop;

    # 1: Loopback
    oif lo accept                                    comment "Loopback interno"

    # 2: Conntrack
    ct state established,related accept              comment "Conexiones establecidas/relacionadas"
    ct state invalid               counter drop      comment "Paquetes con estado inválido"

    # 3: ICMP outgoing (useful types, avoid ICMP tunneling)
    ip protocol icmp icmp type {
        echo-request,
        destination-unreachable,
        time-exceeded,
        parameter-problem,
    } accept                                         comment "ICMP saliente funcional"

    ip6 nexthdr icmpv6 icmpv6 type {
        echo-request,
        destination-unreachable,
        packet-too-big,
        time-exceeded,
        parameter-problem,
        nd-neighbor-solicit,
        nd-neighbor-advert,
        nd-router-solicit,
        mld-listener-report,
    } accept                                         comment "ICMPv6 saliente funcional"

    # 4: DHCP
    ip saddr 0.0.0.0 ip daddr 255.255.255.255 \
        udp sport 68 udp dport 67 accept            comment "DHCP discover/request IPv4"
    ip6 saddr fe80::/10 udp sport 546 udp dport 547 accept \
                                                     comment "DHCPv6 link-local"

    # 5: DNS only Unbound
    ip  daddr 127.0.0.1 udp dport 53 accept         comment "DNS Unbound UDP IPv4"
    ip  daddr 127.0.0.1 tcp dport 53 ct state new accept \
                                                     comment "DNS Unbound TCP IPv4"
    ip6 daddr ::1        udp dport 53 accept         comment "DNS Unbound UDP IPv6"
    ip6 daddr ::1        tcp dport 53 ct state new accept \
                                                     comment "DNS Unbound TCP IPv6"
    udp dport 53 skuid unbound accept               comment "Unbound recursivo UDP"
    tcp dport 53 ct state new skuid unbound accept  comment "Unbound recursivo TCP"
    tcp dport 853 ct state new skuid unbound accept comment "DoT upstream (Unbound)"

    # 6: NTP systemd-timesyncd
    udp dport 123 skuid systemd-timesync accept     comment "NTP (systemd-timesyncd)"

    # 7: HTTP, HTTPS, HTTP/3, QUIC
    tcp dport { 80, 443 } ct state new accept       comment "HTTP / HTTPS"
    udp dport 443 accept comment "HTTP/3 / QUIC saliente"

    # 8: Email
    tcp dport { 465, 587 } ct state new accept      comment "SMTP submission"
    tcp dport { 143, 993 } ct state new accept      comment "IMAP / IMAPS"

    # 9: SSH outgoing
    tcp dport 22 ct state new accept                comment "SSH saliente"

    # 10: Inaoe proxy
    ip daddr 192.100.172.6 tcp dport 3128 ct state new accept \
                                                     comment "Proxy Squid INAOE"

    # 11: Soulseek outgoing
    tcp dport 2234 ct state new accept              comment "Soulseek peers saliente"
    tcp dport 7090 ct state new accept              comment "Soulseek servidor"

    # 12: Torrent outgoing
    tcp dport 51413 ct state new accept             comment "Torrent TCP saliente"
    udp dport 51413 accept                          comment "Torrent UDP saliente"
    udp dport { 6881-6889 } accept                  comment "Torrent DHT UDP saliente"

    # 13: mDNS outgoing
    ip  daddr 224.0.0.251 udp dport 5353 accept     comment "mDNS saliente IPv4"
    ip6 daddr ff02::fb    udp dport 5353 accept     comment "mDNS saliente IPv6"

    # 14: Log + drop
    # limit rate 10/minute burst 20 packets \
    #     log prefix "nftables-OUTPUT-DROP: " flags all counter \
    #     comment "Log drops (rate-limited)"
  }

}
