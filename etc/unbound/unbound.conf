server:
    # Interface and port
    interface: 127.0.0.1
    port: 53
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Only answer to localhost
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.1/32 allow

    # El fallback DoH reenvia a dnscrypt-proxy en 127.0.0.1@5300; sin esto
    # unbound (do-not-query-localhost: yes por defecto) ignora ese forwarder.
    do-not-query-localhost: no

    # DNSSEC
    auto-trust-anchor-file: "/etc/unbound/trusted-key.key"

    # Cache
    cache-min-ttl: 3600
    cache-max-ttl: 86400
    rrset-cache-size: 256m
    msg-cache-size: 128m

    # Privacy
    hide-identity: yes
    hide-version: yes
    qname-minimisation: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes          # DNS 0x20 anti-spoofing

    # Performance
    num-threads: 2
    prefetch: yes
    prefetch-key: yes

# Forward dinámico que escribe el hook de NetworkManager (90-unbound-forward):
# ausente = recursión pura; presente = reenvío a la DNS del DHCP (redes que filtran el 53).
# Glob sin coincidencias no es error en unbound.
include: "/etc/unbound/forward.d/*.conf"
