server:
    # Interface and port
    interface: 127.0.0.1
    port: 53
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Only answer to localhost
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.1/32 allow

    # DNSSEC (trusted-key.key is bootstrapped/maintained by the
    # unbound-trusted-key.hook pacman hook)
    auto-trust-anchor-file: "/etc/unbound/trusted-key.key"

    # Cache
    cache-min-ttl: 3600
    cache-max-ttl: 86400
    rrset-cache-size: 256m
    msg-cache-size: 128m

    # Privacy
    hide-identity: yes
    hide-version: yes
    qname-minimisation: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes          # DNS 0x20 anti-spoofing

    # Performance
    num-threads: 2
    prefetch: yes
    prefetch-key: yes
