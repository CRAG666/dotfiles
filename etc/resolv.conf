# Local stub resolver. unbound listens on 127.0.0.1 only and is IPv4-only by
# design (do-ip6: no in unbound.conf), so it does NOT answer on the IPv6 loopback.
# Do NOT add "nameserver ::1": the resolver would query it first, find nothing
# listening, and stall/fail before falling back to 127.0.0.1. (AAAA/IPv6 records
# are still resolved normally — do-ip6 only controls unbound's upstream transport.)
nameserver 127.0.0.1
options edns0 single-request-reopen
