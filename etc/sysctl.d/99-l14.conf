# ThinkPad L14 Gen 4 (AMD Ryzen 5) — daily driver / dev ultraportable.
# Loaded on top of 99-sysctl.conf; only adds keys, so ordering is irrelevant.

# Moderate bump to the memory-map area limit (Fedora's default). Helps modern
# Electron/Chromium apps and light dev workloads without going to the extreme
# value the ML workstation uses.
vm.max_map_count = 1048576
