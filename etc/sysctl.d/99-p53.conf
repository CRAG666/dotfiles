# ThinkPad P53 (Intel Core i7 + NVIDIA) — ML training / CUDA / dev workstation.
# Loaded on top of 99-sysctl.conf; only adds keys, so ordering is irrelevant.

# Maximum number of memory-map areas a process may have. ML frameworks
# (PyTorch/TensorFlow data loaders), memory-mapped datasets and CUDA unified
# memory create huge numbers of mappings; the kernel default (65530) is easily
# exhausted. This is the SteamOS/Arch "unlimited" value.
vm.max_map_count = 2147483642
