# remap prefix from 'C-b' to 'C-a'
unbind ^b
set -g prefix ^a
bind C-a send-prefix
set -g mouse on
set -g default-terminal "alacritty"

# vi-style copy mode
setw -g mode-keys vi
set -g status-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi V   send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel 'wl-copy'
bind-key -T copy-mode-vi Escape send-keys -X cancel
set -ga terminal-overrides ",*256col*:Tc"
set -g set-titles on
set -g set-titles-string "#S:#I:#P | #T"
set -g status on
set-option -g status-position top
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
bind c new-window      -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# ─── eyes (light) theme ──────────────────────────────────────────────────────
# Palette:
#   bg0  #add4a0   bg1  #a4cc98   bg3  #96be8c   bg4  #88b07e   bg5  #6a9060
#   fg0  #1a1a1a   fg1  #1e2e1c   fg2  #3d5c38
#   red  #7a1e18   green #2a5c22  yellow #5a4808  blue #1e4868
#   teal #145850   violet #3a2860  pink #5a2858  ash  #365c25

# Pane borders
set -g pane-border-style fg='#88b07e'
set -g pane-active-border-style fg='#1e4868'

# Messages / command prompt
set -g message-style bg='#a4cc98',fg='#1a1a1a'
set -g message-command-style bg='#a4cc98',fg='#1a1a1a'

# Status bar
set -g status-style bg='#a4cc98',fg='#1a1a1a'
set -g status-interval 1
set -g status-justify left

# Left: prefix indicator + zoom
set -g status-left '#[bg=#a4cc98,fg=#1e4868,bold]#{?client_prefix,#[bg=#7a1e18#,fg=#add4a0],}  '
set -ga status-left '#[bg=#a4cc98,fg=#7a1e18]#{?window_zoomed_flag, ↕  ,   }'

# Window status (inactive / active)
set-window-option -g window-status-style fg='#3d5c38',bg='#a4cc98'
set-window-option -g window-status-current-style fg='#add4a0',bg='#1e4868',bold
set -g window-status-current-format "#[fg=#a4cc98,bg=#1e4868]#[fg=#add4a0,bg=#1e4868,bold] #I  #W #[fg=#1e4868,bg=#a4cc98]"
set -g window-status-format "#[fg=#a4cc98,bg=#88b07e]#[fg=#1a1a1a,bg=#88b07e] #I  #W #[fg=#88b07e,bg=#a4cc98]"

# Right: session, pane, window
set -g status-right '#[fg=#88b07e,bg=#a4cc98]#[fg=#1a1a1a,bg=#88b07e]  #S '
set -ga status-right '#[fg=#3a2860,bg=#88b07e]#[fg=#add4a0,bg=#3a2860]  #P '
set -ga status-right '#[fg=#7a1e18,bg=#3a2860]#[fg=#add4a0,bg=#7a1e18]  %H:%M '

# Clock mode
set -g clock-mode-colour '#1e4868'
set -g clock-mode-style 24

# Copy mode highlight
set -g mode-style bg='#1e4868',fg='#add4a0'

run -b '~/.tmux/plugins/tpm/tpm'
