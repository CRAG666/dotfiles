# remap prefix from 'C-b' to 'C-a'
unbind ^b
set -g prefix ^a
bind C-a send-prefix
set -g mouse on
set -g default-terminal "alacritty"
set -ga terminal-overrides ",*256col*:Tc"
set -g set-titles on
set -g set-titles-string "#S:#I:#P | #T"
set -g status on
set-option -g status-position top
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
bind c new-window      -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# ─── eyes (light) theme ──────────────────────────────────────────────────────
# Palette:
#   bg0  #1a211a   bg1  #202820   bg3  #2d382d   bg4  #3a463a   bg5  #536053
#   fg0  #d0dcc8   fg1  #b8c8b0   fg2  #9aab94
#   red  #c87868   green #7aab72  yellow #d4b85a  blue #6a94a8
#   teal #5ab8a8   violet #9090b8  pink #b890b0  ash  #7a8c72

# Pane borders
set -g pane-border-style fg='#3a463a'
set -g pane-active-border-style fg='#6a94a8'

# Messages / command prompt
set -g message-style bg='#202820',fg='#d0dcc8'
set -g message-command-style bg='#202820',fg='#d0dcc8'

# Status bar
set -g status-style bg='#202820',fg='#d0dcc8'
set -g status-interval 1
set -g status-justify left

# Left: prefix indicator + zoom
set -g status-left '#[bg=#202820,fg=#6a94a8,bold]#{?client_prefix,#[bg=#c87868#,fg=#1a211a],}  '
set -ga status-left '#[bg=#202820,fg=#c87868]#{?window_zoomed_flag, ↕  ,   }'

# Window status (inactive / active)
set-window-option -g window-status-style fg='#9aab94',bg='#202820'
set-window-option -g window-status-current-style fg='#1a211a',bg='#6a94a8',bold
set -g window-status-current-format "#[fg=#202820,bg=#6a94a8]#[fg=#1a211a,bg=#6a94a8,bold] #I  #W #[fg=#6a94a8,bg=#202820]"
set -g window-status-format "#[fg=#202820,bg=#3a463a]#[fg=#d0dcc8,bg=#3a463a] #I  #W #[fg=#3a463a,bg=#202820]"

# Right: session, pane, window
set -g status-right '#[fg=#3a463a,bg=#202820]#[fg=#d0dcc8,bg=#3a463a]  #S '
set -ga status-right '#[fg=#9090b8,bg=#3a463a]#[fg=#1a211a,bg=#9090b8]  #P '
set -ga status-right '#[fg=#c87868,bg=#9090b8]#[fg=#1a211a,bg=#c87868]  %H:%M '

# Clock mode
set -g clock-mode-colour '#6a94a8'
set -g clock-mode-style 24

# Copy mode highlight
set -g mode-style bg='#6a94a8',fg='#1a211a'

run -b '~/.tmux/plugins/tpm/tpm'
