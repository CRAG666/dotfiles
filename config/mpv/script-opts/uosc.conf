# uosc — apariencia moderna/minimal. Los COLORES no van aqui: viven en
# config/mpv/colors.conf (symlink conmutado por eyes-theme via
# script-opts-append=uosc-color=..., que tiene prioridad sobre este archivo).

# Timeline: linea fina que se expande al acercar el cursor
timeline_style=line
timeline_line_width=3
timeline_size=44
timeline_border=0
timeline_cache=yes
timeline_heatmap=overlay

# Barra de progreso minima siempre visible en modo ventana
progress=windowed
progress_size=2

# Controles: utilidades a la izquierda, transporte centrado, toggles a la derecha
controls=menu,gap,<video,audio>subtitles,<has_many_audio>audio,<has_many_video>video,<has_many_edition>editions,<stream>stream-quality,space,prev,play-pause,next,space,shuffle,loop-playlist,loop-file,gap,<video,audio>speed,gap,fullscreen
controls_size=36
controls_margin=10
controls_spacing=4

# Volumen vertical a la derecha
volume=right
volume_size=44
volume_border=0

# Menus mas amplios y comodos
menu_item_height=40
menu_min_width=280
menu_padding=6

# Barra superior con titulo (border=no en mpv.conf la activa)
top_bar=no-border
top_bar_size=44
top_bar_controls=right
top_bar_title=yes

# Estetica general
border_radius=10
animation_duration=150
scale=1
scale_fullscreen=1.2
font_scale=1
font_bold=no
text_border=1.2

# La UI se desvanece junto con el cursor (cursor-autohide en mpv.conf)
autohide=yes
pause_indicator=flash

# Rangos de capitulos tintados con acentos de la paleta eyes (teal/red con alpha;
# overlay sobre video, funcionan en ambos modos)
chapter_ranges=openings:5ab8a860,endings:5ab8a860,ads:c8786880

destination_time=playtime-remaining
adjust_osd_margins=yes
