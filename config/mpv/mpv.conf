# Optimized shaders for lower-end GPU: Mode A (Fast)
# glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_M.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl:~~/shaders/Anime4K_AutoDownscalePre_x2.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_S.glsl"
glsl-shaders='~~/shaders/NVScaler.glsl'

# Optimized shaders for higher-end GPU: Mode A+A (HQ)
# glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_VL.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl:~~/shaders/Anime4K_AutoDownscalePre_x2.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"

# disable the default osc when using a custom one (uosc)
osc=no
# uosc renders its own volume/seek feedback
osd-bar=no
border=no
# uosc hereda esta fuente para toda su UI
osd-font="SFProDisplay Nerd Font"
# la UI de uosc se desvanece con el cursor (uosc.conf: autohide=yes)
cursor-autohide=1000
loop-playlist=inf
profile=high-quality
vo=gpu
# auto-safe (directo): el frame decodificado se queda en la GPU; -copy lo
# bajaba a RAM en cada frame (mas CPU/bateria). Los glsl-shaders corren en
# GPU igual; solo un filtro CPU (vf=...) necesitaria volver a -copy.
hwdec=auto-safe
hwdec-codecs=all
gpu-context=wayland
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
interpolation
tscale=oversample
embeddedfonts=yes
sub-auto=fuzzy
sub-visibility=yes
script-opts=ytdl_hook-ytdl_path=/usr/bin/yt-dlp

# External script options
# It is fine to leave these here even if one does not use these scripts because they are just ignored unless a script uses them

# UOSC options
# Colores del tema eyes: symlink gitignorado conmutado por eyes-theme.
include=~~/colors.conf
[1080p]
ytdl-format=bestvideo[height<=?1080]+bestaudio/best

