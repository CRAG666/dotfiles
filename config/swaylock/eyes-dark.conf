daemonize
show-failed-attempts
clock
screenshot
effect-blur=15x15
effect-vignette=1:1
color=1a211a80
font="Inter"
indicator
indicator-radius=200
indicator-thickness=20

# idle / typing
inside-color=1a211a
line-color=1a211a
ring-color=7aab72
text-color=d0dcc8
key-hl-color=5ab8a8
bs-hl-color=c87868
separator-color=00000000

# verifying (blue)
inside-ver-color=1a211a
line-ver-color=1a211a
ring-ver-color=6a94a8
text-ver-color=d0dcc8

# wrong (red)
inside-wrong-color=1a211a
line-wrong-color=1a211a
ring-wrong-color=c87868
text-wrong-color=c87868

# cleared (yellow)
inside-clear-color=1a211a
line-clear-color=1a211a
ring-clear-color=d4b85a
text-clear-color=d4b85a

# caps lock (magenta)
text-caps-lock-color=b890b0
caps-lock-key-hl-color=b890b0
caps-lock-bs-hl-color=c87868

grace=2
grace-no-mouse
grace-no-touch
datestr=%a, %B %e
timestr=%I:%M %p
fade-in=0.3
ignore-empty-password
