# Colores del tema eyes para dunst. Se carga como drop-in via el symlink
# gitignorado dunstrc.d/50-colors.conf (los drop-ins sobreescriben dunstrc).
# La variante dark se regenera con `eyes-theme generate` — edita solo la light.

[global]
frame_color = "#1e4868"
highlight = "#1e4868"

[urgency_low]
background = "#a4cc98"
foreground = "#1a1a1a"
frame_color = "#88b07e"

[urgency_normal]
background = "#add4a0"
foreground = "#1a1a1a"
frame_color = "#1e4868"

[urgency_critical]
background = "#add4a0"
foreground = "#1a1a1a"
frame_color = "#7a1e18"
