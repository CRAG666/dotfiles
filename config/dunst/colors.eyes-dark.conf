# Colores del tema eyes para dunst. Se carga como drop-in via el symlink
# gitignorado dunstrc.d/50-colors.conf (los drop-ins sobreescriben dunstrc).
# La variante dark se regenera con `eyes-theme generate` — edita solo la light.

[global]
frame_color = "#6a94a8"
highlight = "#6a94a8"

[urgency_low]
background = "#202820"
foreground = "#d0dcc8"
frame_color = "#3a463a"

[urgency_normal]
background = "#1a211a"
foreground = "#d0dcc8"
frame_color = "#6a94a8"

[urgency_critical]
background = "#1a211a"
foreground = "#d0dcc8"
frame_color = "#c87868"
