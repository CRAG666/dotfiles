# ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą
# ‚Ėą‚Ėą‚ĖĄ‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚ĖÄ‚ĖĄ‚ĖÄ
source = ./colors/mocha.conf
source = ./nvidia.conf
env = HYPRLAND_LOG_WLR,0
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland
env = TERMCMD,"kitty -T yazi"
env = EDITOR,nvim
env = BROWSER,zen-browser
env = QT_QPA_PLATFORM,wayland;xcb
# env = QT_QPA_PLATFORMTHEME,hyprqt6engine
env = QT_QPA_PLATFORMTHEME,xdgdesktopportal
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_SCALE,1
env = GDK_DEBUG,portals
env = GTK_USE_PORTAL,1
env = DISABLE_QT5_COMPAT,0
env = ANKI_WAYLAND,1
env = SDL_VIDEODRIVER,wayland
env = ECORE_EVAS_ENGINE,wayland_egl
env = ELM_ENGINE,wayland_egl
env = AVALONIA_GLOBAL_SCALE_FACTOR,1
env = XDG_SCREENSHOTS_DIR,~/Screenshots
env = CLUTTER_BACKEND,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = MOZ_ENABLE_WAYLAND,1
env = bitdepth,10

# ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ
# ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ

input {
  # kb_layout = latam # XKB layout
  kb_layout = us
  follow_mouse = 1
  sensitivity = 0
  force_no_accel = 1
  kb_options = compose:sclk
  # kb_model = cherryblue # XKB model
  # kb_variant = dvorak # XKB variant
  # numlock_by_default = false
  repeat_delay = 120
  repeat_rate = 30
  # accel_profile = flat # flat, adaptive
  # natural_scroll = true
}

# ‚Ėą‚ĖĎ‚ĖĎ‚ÄÉ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ
# ‚Ėą‚ĖĄ‚ĖĄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚ĖĄ‚Ėą

dwindle {
  # no_gaps_when_only = false
  pseudotile = true
  preserve_split = true
  smart_split = false
  smart_resizing = false
}

# ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ
# ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĄ

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = false
  mouse_move_enables_dpms = true
  animate_manual_resizes = true
  mouse_move_focuses_monitor = true
  enable_swallow = true
  swallow_regex = ^(yazi)$
  font_family = SFProDisplay Nerd Font
  splash_font_family = SFProDisplay Nerd Font
  vfr = true
}

xwayland {
  force_zero_scaling = false
}

cursor {
  no_hardware_cursors = 1
  inactive_timeout = 3
  hide_on_key_press = true
  hide_on_touch = false
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

gestures {
    workspace_swipe_distance = 100
    workspace_swipe_cancel_ratio = 0.15
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

# experimental {
#     wide_color_gamut = true
#     xx_color_management_v4 = true
# }

source = ./startup.conf
source = ./theme.conf
source = ./keybinds.conf
$WORKSPACE_MOTOR = split:
# $WORKSPACE_MOTOR =
source = ./workspace.conf # Multi monitor workspace
# Modes
source = ./newm_mode.conf
# source = ./normal_mode.conf
source = ./windowrule.conf

bind = SUPER, Tab, hyprexpo:expo, toggle

# ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą
# ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ
source = ./monitors.conf
