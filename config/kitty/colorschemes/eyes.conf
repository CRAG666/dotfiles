# vim:ft=kitty
## name:     Eyes (Light)
## blurb:    Calm sage-green light theme designed for eye comfort.
##           ANSI 0-15 follow standard semantics so TUIs render correctly,
##           and every (color0/colorN) pair is AA-readable.

# Basic
foreground              #1a1a1a
background              #add4a0
selection_foreground    #1a1a1a
selection_background    #6a9060

# Cursor
cursor                  #1a1a1a
cursor_text_color       #add4a0

# Scrollbar
scrollbar_handle_color  #486040
scrollbar_track_color   #96be8c

# URL hover
url_color               #1e4868

# Window borders
active_border_color     #1e4868
inactive_border_color   #6a9060
bell_border_color       #7a1e18

# OS titlebar
wayland_titlebar_color  system
macos_titlebar_color    system

# Tab bar
active_tab_foreground   #1a1a1a
active_tab_background   #a4cc98
inactive_tab_foreground #1e2e1c
inactive_tab_background #88b07e
tab_bar_background      #add4a0

# Marks (use light fg, dark bg — readable in both directions)
mark1_foreground        #add4a0
mark1_background        #1e4868
mark2_foreground        #add4a0
mark2_background        #3a2860
mark3_foreground        #add4a0
mark3_background        #145850

# --- ANSI 0-15 -------------------------------------------------------------
# Normal
color0  #1a1a1a
color1  #7a1e18
color2  #2a5c22
color3  #5a4808
color4  #1e4868
color5  #5a2858
color6  #145850
color7  #88b07e

# Bright
color8  #486040
color9  #7a1e18
color10 #3a5030
color11 #7a4a18
color12 #143c52
color13 #3a2860
color14 #1a5858
color15 #a4cc98

# Extended 16-255: keep only the ones kitty needs for special fallbacks.
# Most modern apps use truecolor and ignore these.
color16 #6a3c10
color17 #7a4a18
