# kitten ssh — configuración compartida para todas las conexiones SSH
# hechas con `kitten ssh` (nuestros alias `ssh` y `s`).
# Docs: https://sw.kovidgoyal.net/kitty/kittens/ssh/
#
# El terminfo de kitty se copia SIEMPRE al host remoto de forma automática,
# así que esto ya resuelve el `'xterm-kitty': unknown terminal type`.
# Lo de abajo solo afina la experiencia.

hostname *
    # Integración de shell en el remoto (marcas de prompt, salto entre
    # comandos, título de ventana, portapapeles OSC52, etc.). kitty detecta
    # el shell remoto (bash/zsh/fish) y la inyecta sin tocar tu config.
    shell_integration enabled

    # Reusar una sola conexión SSH para reconexiones instantáneas
    # (multiplexación). Acelera abrir varias sesiones al mismo host.
    share_connections yes

    # No intentar instalar/usar el binario de kitty en el remoto: solo
    # queremos terminfo + shell integration, que es lo que da el 99% del
    # beneficio sin requerir nada instalado en el servidor.
    remote_kitty no
