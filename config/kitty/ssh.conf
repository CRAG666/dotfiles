# kitten ssh — config compartida (alias `ssh`/`s`). terminfo se copia siempre.
# Docs: https://sw.kovidgoyal.net/kitty/kittens/ssh/

hostname *
    shell_integration enabled
    # Multiplexación: reconexiones instantáneas al mismo host.
    share_connections yes
    # Solo terminfo + shell integration; nada instalado en el remoto.
    remote_kitty no
