[general]
unsafe-accounts-conf = false
default-save-path = ~/Descargas
# Comando para :menu (popover tipo which-key con fzf)
default-menu-cmd = fzf --reverse --height=40%

[ui]
index-columns = flags:4,name<20,subject<*,date>=
column-flags = {{.Flags | join ""}}
column-name = {{index (.From | names) 0}}
column-subject = {{.ThreadPrefix}}{{.Subject}}
column-date = {{.DateAutoFormat .Date.Local}}

threading-enabled = true
threading-by-subject = false
force-client-threads = false
show-thread-context = true
sort = -r date
timestamp-format = 2006-01-02 15:04
this-day-time-format = 15:04
this-week-time-format = Mon 15:04
this-year-time-format = Jan 02
message-view-timestamp-format = 2006-01-02 15:04
spinner = [   ],[.  ],[.. ],[...],[ ..],[  .]
sidebar-width = 22
border-char-vertical = │
border-char-horizontal = ─
fuzzy-complete = true
new-message-bell = false

# Vim-like — mantiene cursor a 5 líneas del borde al scrollear
msglist-scroll-offset = 5
# Evita marcar leídos al pasar rápido; espera 500ms en el mensaje
auto-mark-read = true

# Preview pane a la derecha — actualiza al moverte con j/k
# vertical = split lado-a-lado, 40% para la lista, 60% para preview
message-list-split = vertical 60

[statusline]
status-columns = left<*,center:=,right>*
column-left = [{{.Account}}] {{.StatusInfo}}
column-center = {{.PendingKeys}}
column-right = {{.TrayInfo}} | {{cwd}}
separator = " | "
display-mode = text

[viewer]
pager = less -Rc
alternatives = text/plain,text/html
header-layout = From|To,Cc|Bcc,Date,Subject

[openers]
application/pdf = zathura {}
image/* = imv {}
video/* = mpv {}
audio/* = mpv {}
text/html = zen-browser {}
application/msword = libreoffice {}
application/vnd.openxmlformats-officedocument.wordprocessingml.document = libreoffice {}
application/vnd.ms-excel = libreoffice {}
application/vnd.openxmlformats-officedocument.spreadsheetml.sheet = libreoffice {}
application/vnd.ms-powerpoint = libreoffice {}
application/vnd.openxmlformats-officedocument.presentationml.presentation = libreoffice {}

[compose]
editor = nvim
header-layout = To|From,Subject
reply-to-self = false
#address-book-cmd = khard email --parsable --remove-first-line '%s'
file-picker-cmd = yazi --chooser-file=/dev/stdout

[filters]
text/plain = colorize
text/calendar = calendar
text/html = html | colorize
text/markdown = glow -s dark -
text/x-diff = hldiff
text/x-patch = hldiff
message/delivery-status = colorize
message/rfc822 = colorize
application/x-sh = bat -fP --terminal-width=$(tput cols) -l sh
application/json = jq -C .
application/x-yaml = bat -fP --terminal-width=$(tput cols) -l yaml
application/pdf = pdftotext -layout - - | bat -fP --terminal-width=$(tput cols) -l txt
# image/* — sin filtro: aerc (Vaxis) detecta kitty y renderiza nativo
.headers = colorize

[hooks]
mail-received = notify-send "[$AERC_ACCOUNT] Nuevo correo" "De: $AERC_FROM_NAME\nAsunto: $AERC_SUBJECT"

[templates]
template-dirs = ~/.config/aerc/templates
new-message = new_message
quoted-reply = quoted_reply
forwards = forward_as_body
