# Bindings tipo vim para aerc
# Documentación: aerc-binds(5)

<C-p> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>
gt = :next-tab<Enter>
gT = :prev-tab<Enter>
<C-t> = :term<Enter>
<C-c> = :prompt 'Quit?' quit<Enter>
<C-^> = :prev-tab<Enter>
ZZ = :quit<Enter>
ZQ = :quit -f<Enter>

[messages]
q = :prompt 'Quit?' quit<Enter>
? = :help keys<Enter>

j = :next<Enter>
<Down> = :next<Enter>
<C-d> = :next 50%<Enter>
<C-f> = :next 100%<Enter>
<PgDn> = :next 100%<Enter>

k = :prev<Enter>
<Up> = :prev<Enter>
<C-u> = :prev 50%<Enter>
<C-b> = :prev 100%<Enter>
<PgUp> = :prev 100%<Enter>
gg = :select 0<Enter>
G = :select -1<Enter>

J = :next-folder<Enter>
K = :prev-folder<Enter>
H = :collapse-folder<Enter>
L = :expand-folder<Enter>
zc = :collapse-folder<Enter>
zo = :expand-folder<Enter>
'i = :cf INBOX<Enter>
<C-l> = :check-mail<Enter>

# Navegar partes del mensaje en el panel de preview (sin abrirlo)
<C-j> = :next-part<Enter>
<C-k> = :prev-part<Enter>

v = :mark -t<Enter>
V = :mark -v<Enter>

T = :toggle-threads<Enter>
u = :unread<Enter>
* = :flag -t<Enter>
Y = :pipe -b wl-copy<Enter>

<Enter> = :view<Enter>
d = :prompt 'Borrar mensaje(s) seleccionado(s)?' 'delete-message'<Enter>
D = :move Trash<Enter>
A = :archive flat<Enter>

C = :compose<Enter>
i = :compose<Enter>

rr = :reply -a<Enter>
rq = :reply -aq<Enter>
Rr = :reply<Enter>
Rq = :reply -q<Enter>

c = :cf<space>
$ = :term<space>
! = :term<space>
| = :pipe<space>

/ = :search<space>
\ = :filter<space>
n = :next-result<Enter>
N = :prev-result<Enter>
<Esc> = :clear<Enter>

pl = :patch list<Enter>
pa = :patch apply <Tab>
pb = :patch rebase<Enter>
pt = :patch term<Enter>
ps = :patch switch <Tab>
pd = :patch drop <Tab>

[view]
/ = :toggle-key-passthrough<Enter>/
q = :close<Enter>
? = :help keys<Enter>
O = :open<Enter>
o = :open-link<Enter>
gx = :open-link<Enter>
Y = :pipe -b wl-copy<Enter>
S = :save<space>
| = :pipe<space>
D = :move Trash<Enter>
A = :archive flat<Enter>

f = :forward<Enter>
rr = :reply -a<Enter>
rq = :reply -aq<Enter>
Rr = :reply<Enter>
Rq = :reply -q<Enter>

H = :toggle-headers<Enter>
<C-k> = :prev-part<Enter>
<C-j> = :next-part<Enter>
J = :next<Enter>
K = :prev<Enter>

[view::passthrough]
$noinherit = true
$ex = <C-x>
<Esc> = :toggle-key-passthrough<Enter>

[compose]
$ex = <C-x>
<C-k> = :prev-field<Enter>
<C-j> = :next-field<Enter>
<tab> = :next-field<Enter>
<backtab> = :prev-field<Enter>
<A-p> = :switch-account -p<Enter>
<A-n> = :switch-account -n<Enter>

[compose::editor]
$noinherit = true
$ex = <C-x>
<C-k> = :prev-field<Enter>
<C-j> = :next-field<Enter>
<A-p> = :switch-account -p<Enter>
<A-n> = :switch-account -n<Enter>

[compose::review]
y = :send<Enter>
n = :abort<Enter>
p = :postpone<Enter>
q = :choose -o d discard abort -o p postpone postpone<Enter>
e = :edit<Enter>
a = :attach -m<Enter>
A = :attach<space>
d = :detach<space>
ZZ = :send<Enter>
ZQ = :abort<Enter>

[terminal]
$noinherit = true
$ex = <C-x>
<C-p> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>

