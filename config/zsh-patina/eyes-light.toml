# eyes (light) — sage-green palette for zsh-patina.
# Token names mirror Catppuccin's example; only hex values are eyes.

# comments
"comment" = "#486040"

# strings
"string" = "#2a5c22"

# regular expressions
"keyword.operator.regexp" = "#5a2858"

# escape characters
"constant.character" = "#5a2858"

# constants in general
"constant" = "#6a3c10"

# parameters
"variable.parameter" = "#7a4a18"

# environment variables
"variable.other" = "#7a1e18"
"punctuation.definition.variable" = "#7a1e18"

# commands
"variable.function" = "#1e4868"

# home directory ~
"variable.language.tilde" = "#7a1e18"

# keywords
"keyword" = "#3a2860"

# general foreground color
source = "#1a1a1a"

# variable assignments
"storage" = "#5a4808"
"storage.modifier" = "#3a2860"

# support terms (e.g. double braces, let)
"support" = "#1e4868"
"keyword.operator" = "#145850"

# function names
"entity.name.function" = "#1e4868"

# braces
"punctuation.section" = "#486040"

# terminators (e.g. ";;" after a case item)
"punctuation.terminator" = "#486040"

# history expansions
"meta.group.expansion.history" = "#7a1e18"

# reset command substitutions to the theme's default foreground color
"meta.group.expansion.command.parens" = { foreground = "#1a1a1a" }

# dynamic items
"dynamic.callable" = "#1e4868"
"dynamic.callable.missing" = "#7a1e18"
"dynamic.path" = { underline = true }

[metadata]
# Fall back to a light built-in base for any uncovered scope.
extends = "catppuccin-latte"
